<!DOCTYPE html>
<html>
<head>
<title>GreenChip</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0b2a1c; color:white; }
.card { background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; }
</style>
</head>

<body class="text-center">

<!-- HERO -->
<section class="py-20">
  <h1 class="text-5xl font-bold">
    Electronics that <span class="text-green-400">vanish</span>
  </h1>
</section>

<!-- SEARCH -->
<section class="py-6">
  <input id="searchBox" placeholder="Search products..."
    class="p-3 w-96 bg-green-100 text-black rounded">
</section>

<div id="results" class="flex flex-wrap justify-center gap-4 px-10"></div>

<!-- ORDER -->
<section class="py-10">
  <input id="name" placeholder="Name" class="p-3 w-96 bg-green-100 text-black rounded"><br>
  <input id="email" placeholder="Email" class="p-3 w-96 bg-green-100 text-black rounded mt-2"><br>
  <input id="selectedProduct" placeholder="Product (exact name)" class="p-3 w-96 bg-green-100 text-black rounded mt-2"><br>

  <button onclick="order()" class="bg-green-500 px-4 py-2 mt-3 rounded">Order</button>

  <div id="response" class="mt-4"></div>
</section>

<!-- TRACK -->
<section class="py-10">
  <input id="trackId" placeholder="Search by ID" class="p-3 w-96 bg-green-100 text-black rounded"><br>
  <input id="trackProduct" placeholder="Exact Product Name" class="p-3 w-96 bg-green-100 text-black rounded mt-2"><br>

  <button onclick="track()" class="bg-gray-700 px-4 py-2 mt-3 rounded">Search</button>

  <div id="table"></div>
</section>

<!-- CHAT -->
<div class="fixed bottom-5 right-5 w-96 bg-black p-4 rounded-xl">
  <div class="text-green-400 font-bold">Nexa AI</div>
  <div id="chatBox" class="h-52 overflow-auto text-left"></div>
  <input id="chatInput" placeholder="Ask..." class="w-full p-2 text-black mt-2">
</div>

<script>

let products = [];

// LOAD PRODUCTS
async function load() {
  const res = await fetch("/products");
  products = await res.json();
}

// 🔥 SEARCH FIX (THIS WAS YOUR ISSUE)
searchBox.addEventListener("input", () => {
  const val = searchBox.value.toLowerCase();

  if (!val) {
    results.innerHTML = "";
    return;
  }

  const filtered = products.filter(p =>
    p.toLowerCase().includes(val)
  );

  results.innerHTML = filtered.map(p => `
    <div class="card w-64">
      <h3>${p}</h3>
      <button onclick="selectProduct('${p}')"
        class="bg-green-500 px-3 py-1 mt-2 rounded">
        Select
      </button>
    </div>
  `).join("");
});

// SELECT PRODUCT
function selectProduct(name) {
  selectedProduct.value = name;
}

// ORDER
async function order() {
  const res = await fetch("/order", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: name.value,
      email: email.value,
      product: selectedProduct.value
    })
  });

  const data = await res.json();

  response.innerHTML = `
    ${data.message}<br>
    ID: ${data.id}<br>
    Status: ${data.status}<br>
    ETA: ${data.eta}
  `;
}

// TRACK
async function track() {
  const res = await fetch(`/track?id=${trackId.value}&product=${trackProduct.value}`);
  const data = await res.json();

  if (data.error) {
    table.innerHTML = `<div class="text-red-400">${data.error}</div>`;
    return;
  }

  let html = `
  <table class="mx-auto border border-green-400 mt-4">
    <tr class="bg-green-700">
      <th class="border px-4">ID</th>
      <th class="border px-4">Product</th>
      <th class="border px-4">Status</th>
      <th class="border px-4">ETA</th>
    </tr>
  `;

  data.forEach(r => {
    html += `
    <tr class="border">
      <td class="border px-4">${r.id}</td>
      <td class="border px-4">${r.product}</td>
      <td class="border px-4">${r.status}</td>
      <td class="border px-4">${r.eta}</td>
    </tr>`;
  });

  html += "</table>";

  table.innerHTML = html;
}

// CHAT
chatInput.addEventListener("keypress", async e => {
  if(e.key === "Enter"){
    const msg = chatInput.value;

    chatBox.innerHTML += `<div>> ${msg}</div>`;

    const res = await fetch("/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({message: msg})
    });

    const data = await res.json();

    chatBox.innerHTML += `<div style="color:lightgreen;">${data.reply}</div>`;
    chatInput.value="";
  }
});

load();

</script>

</body>
</html>
