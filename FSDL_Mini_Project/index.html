<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenChip</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#13ec5b",
        darkbg: "#0f2a1d"
      }
    }
  }
}
</script>
</head>

<body class="bg-darkbg text-white">

<!-- HERO -->
<section class="min-h-screen flex flex-col justify-center items-center text-center">
  <h1 class="text-5xl font-bold">
    Electronics that <span class="text-primary">vanish</span>
  </h1>
  <p class="text-gray-400 mt-4">
    High-performance biodegradable electronics with zero waste.
  </p>
</section>

<!-- FEATURES -->
<section class="py-16 text-center">
  <h2 class="text-3xl font-bold mb-10">Features</h2>
  <div class="grid md:grid-cols-3 gap-6 px-10">
    <div class="bg-white/5 p-6 rounded">Bio-Resorbable</div>
    <div class="bg-white/5 p-6 rounded">Zero Waste</div>
    <div class="bg-white/5 p-6 rounded">Smart Lifespan</div>
  </div>
</section>

<!-- TIMELINE -->
<section class="py-16 text-center">
  <h2 class="text-3xl font-bold mb-6">Lifecycle</h2>
  <p>Day 1 → Active</p>
  <p>Day 30 → Decomposition</p>
  <p>Day 60 → Fully biodegradable</p>
</section>

<!-- FORM -->
<section class="py-16 text-center">
  <h2 class="text-3xl font-bold mb-6">Request Demo</h2>

  <form id="demoForm" class="space-y-4 max-w-xl mx-auto">
    <input id="fullName" placeholder="Full Name" class="w-full p-3 bg-white/10 rounded">
    <input id="workEmail" placeholder="Email" class="w-full p-3 bg-white/10 rounded">
    <input id="companyName" placeholder="Company" class="w-full p-3 bg-white/10 rounded">
    <textarea id="message" placeholder="Message" class="w-full p-3 bg-white/10 rounded"></textarea>

    <button class="w-full bg-primary text-black py-3 rounded">Submit</button>
  </form>

  <div id="responseBox" class="mt-3 text-green-400"></div>
  <div id="aiBox" class="text-yellow-400"></div>
</section>

<!-- ADMIN -->
<div class="text-center mt-10">
  <button onclick="loadRequests()" class="bg-primary px-6 py-2 rounded">
    View Requests
  </button>
  <p id="count"></p>
</div>

<div id="requestsList" class="max-w-3xl mx-auto mt-6 space-y-3"></div>

<!-- ANALYTICS -->
<h2 class="text-center mt-10">Analytics</h2>
<canvas id="chart"></canvas>

<!-- CHATBOT -->
<div class="fixed bottom-5 right-5 w-72 bg-black/80 p-3 rounded">
  <div class="text-primary font-bold mb-2">AI Assistant</div>
  <div id="chatMessages" class="h-40 overflow-y-auto text-sm mb-2"></div>
  <input id="chatInput" class="w-full p-2 text-black" placeholder="Ask something...">
</div>

<script>

// FORM
demoForm.addEventListener("submit", async e=>{
  e.preventDefault();

  const res = await fetch("/submit",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: fullName.value,
      email: workEmail.value,
      company: companyName.value,
      message: message.value
    })
  });

  const r = await res.json();
  responseBox.innerText = r.message;
  aiBox.innerText = r.type + " | Score: " + r.priority;

  demoForm.reset();
});

// LOAD REQUESTS
async function loadRequests(){
  const res = await fetch("/requests");
  const data = await res.json();

  count.innerText = "Total Requests: " + data.count;
  requestsList.innerHTML = "";

  let hot=0,warm=0,cold=0;

  data.data.forEach(r=>{
    if(r.type.includes("Hot")) hot++;
    else if(r.type.includes("Warm")) warm++;
    else cold++;

    const d=document.createElement("div");
    d.className="bg-white/5 p-3 rounded";
    d.innerText=`${r.name} (${r.email}) - ${r.type}`;
    requestsList.appendChild(d);
  });

  new Chart(chart,{
    type:"bar",
    data:{
      labels:["Hot","Warm","Cold"],
      datasets:[{data:[hot,warm,cold]}]
    }
  });
}

// CHATBOT
chatInput.addEventListener("keypress", async e=>{
  if(e.key==="Enter"){
    const msg = chatInput.value;

    chatMessages.innerHTML += `<div>> ${msg}</div>`;

    const res = await fetch("/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({message:msg})
    });

    const data = await res.json();

    chatMessages.innerHTML += `<div class="text-primary">${data.reply}</div>`;

    chatInput.value="";
  }
});

</script>

</body>
</html>
