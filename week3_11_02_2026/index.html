<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practical 3 - Bootstrap</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {background: linear-gradient(135deg,#1e3c72,#2a5298);}
.glass-card {background: rgba(255,255,255,0.95); border-radius:20px; padding:20px;}
.hero-section {background: linear-gradient(90deg,#ff512f,#dd2476); color:white; padding:20px; border-radius:15px;}
.ticket-card {background:#fff; padding:20px; border-radius:10px;}
</style>
</head>

<body class="text-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="#">ABC Institute</a>
</div>
</nav>

<!-- Breadcrumb -->
<div class="container mt-3">
<nav>
<ol class="breadcrumb bg-white p-2 rounded">
<li class="breadcrumb-item">Home</li>
<li class="breadcrumb-item active">Bootstrap Practical</li>
</ol>
</nav>
</div>

<!-- Hero -->
<div class="container mt-4">
<div class="hero-section text-center">
<h1>Welcome to Bootstrap 5</h1>
<p>Grid, Forms, Navbar & Ticket</p>
<button class="btn btn-light">Explore</button>
</div>
</div>

<!-- Grid -->
<div class="container mt-4">
<div class="row text-center">
<div class="col-md-4"><div class="card bg-primary text-white p-3">Column 1</div></div>
<div class="col-md-4"><div class="card bg-success text-white p-3">Column 2</div></div>
<div class="col-md-4"><div class="card bg-danger text-white p-3">Column 3</div></div>
</div>
</div>

<!-- Form -->
<div class="container mt-4">
<div class="glass-card text-dark">
<h3 class="text-center">Registration Form</h3>

<input class="form-control mb-2" placeholder="Full Name">
<input class="form-control mb-2" placeholder="Email">
<input class="form-control mb-2" type="password" placeholder="Password">

<select class="form-control mb-2">
<option>Male</option>
<option>Female</option>
</select>

<button class="btn btn-success w-100">Register</button>
</div>
</div>

<!-- Ticket -->
<div class="container mt-4 mb-5">
<div class="ticket-card">
<h4>Examination Ticket</h4>
<p>Name: Vivian</p>
<p>Course: BSc IT</p>
<p>Time: 10 AM</p>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
