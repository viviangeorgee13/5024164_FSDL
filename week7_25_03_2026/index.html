<!DOCTYPE html>
<html ng-app="myApp">
<head>
  <meta charset="UTF-8">
  <title>AngularJS Exp 7</title>

  <!-- AngularJS CDN -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #1e293b;
      color: white;
      text-align: center;
      padding: 50px;
    }

    .box {
      background: #0f172a;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
    }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
      margin-top: 10px;
    }
  </style>
</head>

<body ng-controller="myController">

  <div class="box">
    <h2>AngularJS Hello World</h2>

    <!-- ng-model -->
    <input type="text" ng-model="name" placeholder="Enter your name">

    <!-- Expression -->
    <p>Hello, {{ name || 'User' }} 👋</p>
  </div>

  <script>
    var app = angular.module("myApp", []);

    app.controller("myController", function($scope) {
      $scope.name = "";
    });
  </script>

</body>
</html>
